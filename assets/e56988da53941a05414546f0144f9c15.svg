<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="400" height="600" viewBox="0,0,400,600"><g stroke="none" stroke-miterlimit="10"><path d="M0,600v-600h400v600z" fill-opacity="0.8" fill="#000000" stroke-width="0"/><text transform="translate(4.05466,49.16221) scale(0.3944,0.3944)" font-size="40" xml:space="preserve" fill="#ffffff" stroke-width="1" font-family="Sans Serif" font-weight="400" text-anchor="start"><tspan x="0" dy="0">再度クリックすると閉じます。</tspan><tspan x="0" dy="48px"> </tspan><tspan x="0" dy="48px"> </tspan><tspan x="0" dy="48px">【更新情報】</tspan><tspan x="0" dy="48px">2026/06: 今更ですがビアガーデン開催に伴う16階の</tspan><tspan x="0" dy="48px">停止モードを反映しました。なお、営業開始前後の</tspan><tspan x="0" dy="48px">挙動は現地で確認できていないため正確でない場合が</tspan><tspan x="0" dy="48px">あります。</tspan><tspan x="0" dy="48px"> </tspan><tspan x="0" dy="48px"> </tspan><tspan x="0" dy="48px">【使い方】</tspan><tspan x="0" dy="48px">各ランプが停止状態を示します。</tspan><tspan x="0" dy="48px">・橙→停止階</tspan><tspan x="0" dy="48px">・緑→乗車専用階</tspan><tspan x="0" dy="48px">・灰→通過階</tspan><tspan x="0" dy="48px">画面上部のLED表示では、各ランプをクリックすると</tspan><tspan x="0" dy="48px">選択された階・号機で実際に使われている停止階スク</tspan><tspan x="0" dy="48px">ロール表示を再現します。</tspan><tspan x="0" dy="48px"> </tspan><tspan x="0" dy="48px">※停止階はお使いの端末の時刻をもとに表示されます。</tspan><tspan x="0" dy="48px">※時間帯ごとの停止階や変動する時刻は、制作者が現地</tspan><tspan x="0" dy="48px">で確認した動作を基に設定してあります。</tspan><tspan x="0" dy="48px">※エレベーターの休止については反映していません。</tspan><tspan x="0" dy="48px">※情報は2026年6月現在のもので、実際と異なる場合が</tspan><tspan x="0" dy="48px">あります。</tspan><tspan x="0" dy="48px"> </tspan><tspan x="0" dy="48px"> </tspan><tspan x="0" dy="48px">最終更新 2026.06.01</tspan></text></g></svg>